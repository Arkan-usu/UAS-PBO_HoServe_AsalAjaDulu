# ===========================
# HoServe - Application Config
# ===========================

# Server
server.port=8080

# ===========================
# H2 Database (In-Memory)
# ===========================
spring.datasource.url=jdbc:h2:mem:hoserve
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (akses via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=HoServeSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024!
app.jwt.expiration-ms=86400000

# ===========================
# Logging
# ===========================
logging.level.com.hoserve=DEBUG
logging.level.org.springframework.security=DEBUG
